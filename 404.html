<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>TA/RW Assessment</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect - preserve the path
      var pathSegmentsToKeep = 1;
      var l = window.location;
      
      // Get the path after the repo name
      var pathArray = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep);
      var pathToKeep = pathArray.join('/');
      var additionalPath = l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/');
      
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        pathToKeep + '/?/' + additionalPath.replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
